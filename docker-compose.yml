# Stack de producción · Punky Intranet
# Levanta:  db (PostgreSQL) · server (API Express) · web (Nginx + frontend)
# Uso:      docker compose up -d --build
# Variables:  se leen del archivo .env (copiar de .env.production.example)

# Rotación de logs: sin esto Docker acumula logs sin límite y satura el disco.
# Máximo por contenedor: 3 archivos de 10 MB (30 MB c/u, 90 MB el stack).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: punky
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD en .env}
      POSTGRES_DB: punky_intranet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U punky -d punky_intranet"]
      interval: 5s
      timeout: 5s
      retries: 12
    # El puerto NUNCA se expone a internet. Por defecto queda solo en
    # localhost del VPS; para la réplica de Profit se enlaza a la IP privada
    # del túnel Tailscale con PG_BIND (ver docs/replica-profit.md).
    ports:
      - "${PG_BIND:-127.0.0.1}:5432:5432"

  server:
    build: ./server
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Zona horaria del negocio: los correos programados (CxC diario, reporte IA)
      # usan la hora local del contenedor. Default Venezuela.
      TZ: ${TZ:-America/Caracas}
      PORT: "4000"
      DATABASE_URL: postgres://punky:${POSTGRES_PASSWORD}@db:5432/punky_intranet
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET en .env}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TV_ACCESS_KEY: ${TV_ACCESS_KEY:-}
      SYNC_TOKEN: ${SYNC_TOKEN:-}
      # Notificaciones
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-Punky Partners <notificaciones@punkypartners.com>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CXC_DIARIO_HORA: ${CXC_DIARIO_HORA:-7}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-console}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      WA_CLOUD_PHONE_NUMBER_ID: ${WA_CLOUD_PHONE_NUMBER_ID:-}
      WA_CLOUD_ACCESS_TOKEN: ${WA_CLOUD_ACCESS_TOKEN:-}
      # Migración intranet-Sheets (Ola 1: catálogos)
      SHEETS_URL_PRODUCTOS: ${SHEETS_URL_PRODUCTOS:-}
      SHEETS_URL_ALMACENES: ${SHEETS_URL_ALMACENES:-}
      SHEETS_URL_CATEGORIAS: ${SHEETS_URL_CATEGORIAS:-}
      SHEETS_REFRESH_MIN: ${SHEETS_REFRESH_MIN:-15}
      # Profit Plus 2K12
      PROFIT_PLUS_MODE: ${PROFIT_PLUS_MODE:-simulado}
      # Modo réplica: lista de precios, tipos de stock y mapeo almacén→sede
      PP_LISTA: ${PP_LISTA:-001}
      PP_STOCK_TIPOS: ${PP_STOCK_TIPOS:-}
      PP_ALMACEN_SEDES: ${PP_ALMACEN_SEDES:-002:Almacén Boleíta,035:Almacén Principal}
      PP_MONEDA: ${PP_MONEDA:-Bs}
      # Tasa BCV (equivalente USD de montos en Bs)
      BCV_API_URL: ${BCV_API_URL:-https://ve.dolarapi.com/v1/dolares/oficial}
      BCV_TASA_MANUAL: ${BCV_TASA_MANUAL:-}
      BCV_TASA_FALLBACK: ${BCV_TASA_FALLBACK:-}
      BCV_REFRESH_HORAS: ${BCV_REFRESH_HORAS:-8}
      PP_DB_HOST: ${PP_DB_HOST:-}
      PP_DB_PORT: ${PP_DB_PORT:-1433}
      PP_DB_NAME: ${PP_DB_NAME:-}
      PP_DB_USER: ${PP_DB_USER:-}
      PP_DB_PASSWORD: ${PP_DB_PASSWORD:-}
    expose:
      - "4000"

  web:
    build: ./client
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - server
    ports:
      # Puerto del host configurable (WEB_PORT en .env). Por defecto 8080 para
      # no chocar con otros servicios que ya usen el 80 en el VPS (ej. Hermes).
      # Adentro el contenedor siempre sirve por el 80.
      - "${WEB_PORT:-8080}:80"
      # HTTPS (cuando actives dominio + certbot, ver docs/deploy-vps.md):
      # - "443:443"

volumes:
  pgdata:
