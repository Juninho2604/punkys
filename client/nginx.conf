# Nginx del contenedor `web`: sirve el frontend y proxya /api al backend.
# Frontend y API quedan en el MISMO origen → sin CORS y las cookies de sesión
# funcionan directo.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tamaño máximo de subida (documentos, etc.)
    client_max_body_size 20m;

    # API → contenedor `server` (red interna de Docker Compose)
    location /api/ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA: cualquier ruta desconocida sirve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache larga para assets con hash de Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
